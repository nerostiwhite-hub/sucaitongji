<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=2.0">
  <title>PTOE · 视觉小说素材统计</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #f5f0e8;
      font-family: 'Segoe UI', 'Roboto', 'Noto Sans', system-ui, -apple-system, sans-serif;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      color: #3e3a37;
    }

    .container {
      max-width: 800px;
      width: 100%;
      background: rgba(255, 251, 245, 0.9);
      backdrop-filter: blur(12px);
      background: #fffcf4;
      box-shadow: 0 20px 35px rgba(0, 0, 0, 0.08), 0 5px 12px rgba(0, 0, 0, 0.05);
      border-radius: 2.5rem;
      padding: 2rem 2rem 2.2rem;
      border: 1px solid #ede3d3;
    }

    h1 {
      font-weight: 500;
      font-size: 2.2rem;
      letter-spacing: 2px;
      color: #5b4b3a;
      display: flex;
      align-items: baseline;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
      border-bottom: 2px dashed #dacbb8;
      padding-bottom: 0.7rem;
    }
    h1 span {
      font-size: 1rem;
      font-weight: 400;
      color: #8b7a66;
      margin-left: 0.3rem;
      letter-spacing: 0.5px;
    }

    .sub {
      color: #8e806e;
      margin-bottom: 2rem;
      font-style: italic;
    }

    /* 计数器卡片 */
    .counter-grid {
      display: flex;
      flex-direction: column;
      gap: 2rem;
      margin: 1.5rem 0 2rem;
    }

    .counter-card {
      background: #fefaf2;
      border-radius: 1.8rem;
      padding: 1.5rem 1.5rem 1.8rem;
      box-shadow: 0 8px 18px rgba(140, 110, 70, 0.08);
      border: 1px solid #e7daca;
      transition: all 0.2s ease;
    }

    .counter-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .counter-title {
      font-weight: 600;
      font-size: 1.5rem;
      color: #4f3f2e;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .counter-title i {
      font-style: normal;
      font-size: 1.8rem;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: #f3ede4;
      padding: 0.3rem 0.6rem;
      border-radius: 3rem;
    }

    .btn {
      background: transparent;
      border: none;
      width: 2.5rem;
      height: 2.5rem;
      border-radius: 2rem;
      font-size: 1.8rem;
      font-weight: 400;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #5e4e3a;
      background: #ffffff;
      box-shadow: 0 2px 6px rgba(0,0,0,0.04);
      transition: all 0.2s;
      line-height: 1;
      user-select: none;
      border: 1px solid #ddd0bd;
    }

    .btn:hover {
      background: #ede0cd;
      border-color: #c8b69a;
      color: #2f2418;
    }

    .btn:active {
      background: #dacbb2;
      transform: scale(0.94);
    }

    .number-display {
      font-size: 2.2rem;
      font-weight: 550;
      min-width: 3.5rem;
      text-align: center;
      color: #3b3224;
      background: #fffbf5;
      padding: 0.1rem 0.2rem;
      border-radius: 1.2rem;
      letter-spacing: 0.5px;
    }

    .remark-section {
      margin-top: 1.2rem;
    }

    .remark-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
      table-layout: auto;
      background: #fffef9;
      border-radius: 1rem;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.02);
      border: 1px solid #e2d4c0;
    }

    .remark-table th {
      background: #f3ede2;
      color: #4b3c2c;
      font-weight: 600;
      padding: 0.7rem 0.5rem;
      text-align: left;
      font-size: 0.85rem;
      letter-spacing: 0.4px;
      border-bottom: 2px solid #dacbb8;
    }

    .remark-table td {
      padding: 0.5rem 0.5rem;
      border-bottom: 1px solid #ede3d2;
      vertical-align: top;
    }

    .remark-table input,
    .remark-table textarea {
      width: 100%;
      border: 1px solid #dbceb8;
      border-radius: 0.6rem;
      padding: 0.5rem 0.6rem;
      font-family: inherit;
      font-size: 0.85rem;
      background: #fffdf7;
      resize: vertical;
      transition: border 0.15s;
      color: #3b362e;
      background: #fffefb;
    }

    .remark-table input:focus,
    .remark-table textarea:focus {
      outline: none;
      border-color: #b29670;
      box-shadow: 0 0 0 3px rgba(180, 140, 100, 0.15);
    }

    .remark-table textarea {
      min-height: 2.8rem;
      resize: vertical;
      overflow-y: auto;
      line-height: 1.45;
    }

    /* 自动增高根据内容，同时保留手动调整 */
    .remark-table td {
      position: relative;
    }

    .save-panel {
      display: flex;
      justify-content: flex-end;
      margin-top: 2rem;
      gap: 0.8rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .save-btn {
      background: #d9c5a7;
      border: none;
      padding: 0.8rem 2.2rem;
      border-radius: 3rem;
      font-weight: 600;
      font-size: 1rem;
      letter-spacing: 0.8px;
      color: #2f2a22;
      background: #e7d7be;
      box-shadow: 0 5px 12px rgba(140, 110, 60, 0.18);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      transition: 0.2s;
      border: 1px solid #ccb690;
      backdrop-filter: blur(4px);
    }

    .save-btn:hover {
      background: #ddc9a8;
      border-color: #b2966b;
      color: #1e1810;
      box-shadow: 0 8px 18px rgba(130, 100, 50, 0.22);
    }

    .save-btn:active {
      background: #cdb48b;
      transform: translateY(1px);
    }

    .status-msg {
      font-size: 0.9rem;
      color: #6b5d4b;
      background: #f3ede2;
      padding: 0.4rem 1rem;
      border-radius: 2rem;
      opacity: 0.9;
    }

    hr {
      border: 0.5px solid #e2d3bd;
      margin: 1.5rem 0 0.5rem;
    }

    .footer-note {
      text-align: right;
      font-size: 0.8rem;
      color: #b8a68b;
      margin-top: 0.5rem;
    }

    @media (max-width: 500px) {
      body {
        padding: 0.8rem;
      }
      .container {
        padding: 1.5rem;
      }
      .counter-header {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
<div class="container">
  <h1>
    📖 PTOE
    <span>素材需求统计</span>
  </h1>
  <div class="sub">视觉小说 · 逐项记录</div>

  <div class="counter-grid" id="counterGrid">
    <!-- 动态通过js生成三个计数器，保证结构一致且便于维护 -->
  </div>

  <div class="save-panel">
    <span class="status-msg" id="saveStatus">💾 随时保存</span>
    <button class="save-btn" id="saveButton">📋 保存当前记录</button>
  </div>
  <hr>
  <div class="footer-note">点击 +/- 调整数量 · 备注自动扩展</div>
</div>

<script>
  (function() {
    // ---------- 定义三个素材类型 ----------
    const CATEGORIES = [
      { id: 'cg', label: 'CG', icon: '🖼️' },
      { id: 'npc', label: 'NPC立绘', icon: '🧑‍🎨' },
      { id: 'scene', label: '场景图片', icon: '🏞️' }
    ];

    // 备注表格的列定义 (章节定位, 概述, 差分)
    const REMARK_COLUMNS = [
      { key: 'chapter', label: '章节定位', placeholder: '例：第3章-公园' },
      { key: 'summary', label: '概述', placeholder: '内容简述...' },
      { key: 'diff', label: '差分', placeholder: '表情/服装等' }
    ];

    // 数据存储结构
    let projectData = {
      cg: { count: 0, remarks: [] },
      npc: { count: 0, remarks: [] },
      scene: { count: 0, remarks: [] }
    };

    // 尝试从 localStorage 加载
    function loadFromStorage() {
      try {
        const stored = localStorage.getItem('ptoe_material_data');
        if (stored) {
          const parsed = JSON.parse(stored);
          // 简单合并，确保结构完整
          if (parsed && typeof parsed === 'object') {
            CATEGORIES.forEach(cat => {
              if (parsed[cat.id] && typeof parsed[cat.id].count === 'number') {
                projectData[cat.id].count = parsed[cat.id].count;
              }
              if (parsed[cat.id] && Array.isArray(parsed[cat.id].remarks)) {
                // 深拷贝备注数组，但确保每个备注对象包含所需字段
                projectData[cat.id].remarks = parsed[cat.id].remarks.map(r => ({
                  chapter: r?.chapter || '',
                  summary: r?.summary || '',
                  diff: r?.diff || ''
                }));
              }
            });
            // 同步数量与备注长度（防止不一致：若备注数量 > count，以备注为准补全？但以count为权威，裁剪或保留）
            // 设计：以count为权威，但保留已有备注。如果count小于备注数，删减多余备注；如果count大于备注数，补充空备注。
            syncRemarksWithCounts();
          }
        }
      } catch (e) {
        console.warn('读取存储失败', e);
      }
    }

    // 根据当前count调整备注数组长度
    function syncRemarksWithCounts() {
      CATEGORIES.forEach(cat => {
        const data = projectData[cat.id];
        const targetLength = data.count;
        if (!Array.isArray(data.remarks)) data.remarks = [];
        
        while (data.remarks.length > targetLength) {
          data.remarks.pop();
        }
        while (data.remarks.length < targetLength) {
          data.remarks.push({ chapter: '', summary: '', diff: '' });
        }
      });
    }

    // 保存到 localStorage
    function saveToStorage() {
      try {
        // 确保数据整洁
        syncRemarksWithCounts();
        localStorage.setItem('ptoe_material_data', JSON.stringify(projectData));
        return true;
      } catch (e) {
        console.error('保存失败', e);
        return false;
      }
    }

    // 更新UI中的某个计数器区域
    function renderCategory(catId) {
      const cat = CATEGORIES.find(c => c.id === catId);
      if (!cat) return;
      const data = projectData[catId];
      // 确保数据一致性
      if (data.remarks.length !== data.count) {
        syncRemarksWithCounts();
      }

      const card = document.getElementById(`card-${catId}`);
      if (!card) return;

      // 更新数字显示
      const numberSpan = card.querySelector('.number-display');
      if (numberSpan) numberSpan.textContent = data.count;

      // 更新表格体
      const tbody = card.querySelector('.remark-tbody');
      if (!tbody) return;
      
      // 清空并重新构建备注行
      tbody.innerHTML = '';
      
      if (data.count === 0) {
        // 显示一行占位提示
        const emptyRow = document.createElement('tr');
        emptyRow.innerHTML = `<td colspan="3" style="text-align: center; color: #b9aa92; padding: 1.2rem; font-style: italic;">暂无素材，点击 + 添加备注</td>`;
        tbody.appendChild(emptyRow);
        return;
      }

      // 根据remarks数组生成行
      data.remarks.forEach((remark, index) => {
        const row = document.createElement('tr');
        
        REMARK_COLUMNS.forEach(col => {
          const td = document.createElement('td');
          if (col.key === 'summary' || col.key === 'diff') {
            // 使用textarea实现自动换行和高度适应
            const textarea = document.createElement('textarea');
            textarea.setAttribute('rows', '1');
            textarea.value = remark[col.key] || '';
            textarea.placeholder = col.placeholder || '';
            // 自动调整高度
            autoResizeTextarea(textarea);
            textarea.addEventListener('input', function(e) {
              autoResizeTextarea(this);
              // 更新对应数据
              updateRemarkField(catId, index, col.key, this.value);
            });
            td.appendChild(textarea);
          } else {
            // 章节定位使用input（单行）
            const input = document.createElement('input');
            input.type = 'text';
            input.value = remark[col.key] || '';
            input.placeholder = col.placeholder || '';
            input.addEventListener('input', function(e) {
              updateRemarkField(catId, index, col.key, e.target.value);
            });
            td.appendChild(input);
          }
          row.appendChild(td);
        });
        
        tbody.appendChild(row);
      });
    }

    // 自动调整textarea高度
    function autoResizeTextarea(textarea) {
      if (!textarea) return;
      textarea.style.height = 'auto';
      textarea.style.height = (textarea.scrollHeight) + 'px';
    }

    // 更新某个备注字段
    function updateRemarkField(catId, index, field, value) {
      if (!projectData[catId] || !projectData[catId].remarks[index]) {
        // 容错：若索引异常，尝试同步
        syncRemarksWithCounts();
        if (!projectData[catId]?.remarks[index]) return;
      }
      projectData[catId].remarks[index][field] = value;
      // 注意：不自动保存到storage，等用户点击保存按钮。
    }

    // 改变计数
    function changeCount(catId, delta) {
      const data = projectData[catId];
      if (!data) return;
      
      const newCount = data.count + delta;
      if (newCount < 0) return; // 不允许负数
      
      data.count = newCount;
      
      // 调整备注数组
      if (delta > 0) {
        // 增加：在末尾添加空备注
        for (let i = 0; i < delta; i++) {
          data.remarks.push({ chapter: '', summary: '', diff: '' });
        }
      } else if (delta < 0) {
        // 减少：从末尾移除
        const removeCount = Math.abs(delta);
        data.remarks = data.remarks.slice(0, Math.max(0, data.remarks.length - removeCount));
      }
      
      // 再次确保长度匹配
      syncRemarksWithCounts();
      
      // 重新渲染该分类
      renderCategory(catId);
      
      // 更新保存状态提示（提示未保存）
      document.getElementById('saveStatus').textContent = '✏️ 未保存更改';
    }

    // 完整渲染所有卡片
    function renderAll() {
      const grid = document.getElementById('counterGrid');
      if (!grid) return;
      
      grid.innerHTML = '';
      
      CATEGORIES.forEach(cat => {
        const data = projectData[cat.id];
        const card = document.createElement('div');
        card.className = 'counter-card';
        card.id = `card-${cat.id}`;
        
        // 构建HTML结构
        card.innerHTML = `
          <div class="counter-header">
            <div class="counter-title">
              <i>${cat.icon}</i> ${cat.label}
            </div>
            <div class="controls">
              <button class="btn decrease-btn" data-cat="${cat.id}">−</button>
              <span class="number-display">${data.count}</span>
              <button class="btn increase-btn" data-cat="${cat.id}">+</button>
            </div>
          </div>
          <div class="remark-section">
            <table class="remark-table">
              <thead>
                <tr>
                  ${REMARK_COLUMNS.map(col => `<th>${col.label}</th>`).join('')}
                </tr>
              </thead>
              <tbody class="remark-tbody">
                <!-- 动态注入行 -->
              </tbody>
            </table>
          </div>
        `;
        
        grid.appendChild(card);
        
        // 绑定事件
        const decreaseBtn = card.querySelector('.decrease-btn');
        const increaseBtn = card.querySelector('.increase-btn');
        
        decreaseBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          changeCount(cat.id, -1);
        });
        
        increaseBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          changeCount(cat.id, 1);
        });
        
        // 立即渲染备注表格部分
        renderCategory(cat.id);
      });
    }

    // 为所有现有的textarea绑定自动高度（在动态创建后通过renderCategory调用）
    // 额外监听window加载完成确保自适应
    window.addEventListener('load', () => {
      // 初次加载时从storage读取
      loadFromStorage();
      syncRemarksWithCounts();
      renderAll();
      
      // 对所有已存在的textarea做一次自适应 (renderCategory已经处理)
    });

    // 保存按钮逻辑
    const saveBtn = document.getElementById('saveButton');
    const statusEl = document.getElementById('saveStatus');
    
    if (saveBtn) {
      saveBtn.addEventListener('click', () => {
        // 保存前同步一下（确保数量与备注一致）
        syncRemarksWithCounts();
        const success = saveToStorage();
        if (success) {
          statusEl.textContent = '✅ 已保存到浏览器';
          setTimeout(() => {
            if (statusEl.textContent === '✅ 已保存到浏览器') {
              statusEl.textContent = '💾 已保存';
            }
          }, 2000);
        } else {
          statusEl.textContent = '❌ 保存失败';
        }
      });
    }

    // 页面关闭或刷新前自动尝试保存？不强制，但可以提醒（可选）。这里不加自动保存以免覆盖用户意图。
    // 但提供一个额外：当修改备注时状态提示变化，已在changeCount和updateRemarkField间接体现。
    // 为输入框修改添加状态提示
    document.addEventListener('input', function(e) {
      if (e.target.closest('.remark-table')) {
        // 任何备注输入改变时，显示未保存
        if (statusEl) {
          statusEl.textContent = '✏️ 未保存更改';
        }
      }
    });

    // 初始化：加载数据并渲染
    loadFromStorage();
    syncRemarksWithCounts();
    renderAll();

    // 额外处理：如果某些textarea在后续渲染中，autoResize已经调用。
    // 针对动态增加的备注行，在renderCategory里已调用autoResizeTextarea。
  })();
</script>
</body>
</html>
